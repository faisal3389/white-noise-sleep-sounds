<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>White Noise - Splash Screen Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --background: #0C0E12;
    --surface-container: #171A1F;
    --surface-container-low: #111318;
    --primary: #7FE6DB;
    --primary-dim: #71D7CD;
    --primary-container: #47B0A7;
    --secondary: #96A5FF;
    --secondary-dim: #8998F0;
    --tertiary: #CCF9FF;
    --on-surface: #F6F6FC;
    --on-surface-variant: #AAABB0;
    --outline-variant: #46484D;
  }

  body {
    background: var(--background);
    color: var(--on-surface);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Splash Wrapper ── */
  .splash {
    position: relative;
    width: 100%;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── Cinematic Hue Gradient Background (warm amber → olive → teal → dark) ── */
  .splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      /* Warm amber/gold glow — top right corner like the original */
      radial-gradient(ellipse 70% 45% at 65% 5%, rgba(196, 164, 90, 0.18) 0%, transparent 65%),
      /* Soft peach/warm wash — top left */
      radial-gradient(ellipse 50% 35% at 25% 8%, rgba(180, 140, 80, 0.10) 0%, transparent 55%),
      /* Olive/forest mid transition */
      radial-gradient(ellipse 90% 40% at 50% 35%, rgba(80, 95, 60, 0.12) 0%, transparent 60%),
      /* Teal accent glow — center-low */
      radial-gradient(ellipse 60% 35% at 50% 60%, rgba(127, 230, 219, 0.07) 0%, transparent 55%),
      /* Warm amber wash — middle right (lifts the darkness) */
      radial-gradient(ellipse 45% 40% at 80% 50%, rgba(180, 150, 80, 0.10) 0%, transparent 55%),
      /* Soft golden haze — lower right */
      radial-gradient(ellipse 50% 35% at 70% 70%, rgba(160, 130, 70, 0.07) 0%, transparent 50%),
      /* Warm olive lift — lower center */
      radial-gradient(ellipse 70% 30% at 45% 75%, rgba(110, 110, 60, 0.06) 0%, transparent 50%),
      /* Subtle indigo depth — bottom corners */
      radial-gradient(ellipse 50% 40% at 15% 85%, rgba(150, 165, 255, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse 40% 35% at 85% 80%, rgba(71, 176, 167, 0.04) 0%, transparent 50%),
      /* Base vertical gradient: warm top → cool bottom (lifted lower half) */
      linear-gradient(180deg,
        #1a1610 0%,
        #1a1812 5%,
        #191a10 10%,
        #161a12 18%,
        #131912 25%,
        #111814 35%,
        #10171a 48%,
        #0f1519 60%,
        #0e1418 72%,
        #0d1216 85%,
        #0C1014 100%
      );
    animation: gradientShift 10s ease-in-out infinite alternate;
    z-index: 0;
  }

  /* Slow ambient hue shift overlay */
  .gradient-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 60% 0%, rgba(210, 170, 90, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 40% 40%, rgba(100, 120, 70, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse 55% 40% at 75% 55%, rgba(180, 145, 70, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse 70% 35% at 50% 80%, rgba(140, 120, 65, 0.05) 0%, transparent 50%);
    animation: gradientShift 10s ease-in-out infinite alternate-reverse;
    z-index: 0;
  }

  @keyframes gradientShift {
    0% { opacity: 1; }
    50% { opacity: 0.75; }
    100% { opacity: 1; }
  }

  /* ── Subtle Grain Texture ── */
  .splash::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.025;
    mix-blend-mode: overlay;
    background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="1"/></svg>');
    background-size: 128px 128px;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Center Content ── */
  .splash-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    gap: 28px;
  }

  /* ── Logo / Icon ── */
  .logo-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-glow {
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(127, 230, 219, 0.15) 0%, transparent 70%);
    filter: blur(30px);
    animation: pulseGlow 4s ease-in-out infinite;
  }

  @keyframes pulseGlow {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .logo-circle {
    position: relative;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 60px rgba(127, 230, 219, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Waveform Icon (SVG) ── */
  .waveform-icon {
    width: 52px;
    height: 52px;
    filter: drop-shadow(0 0 12px rgba(127, 230, 219, 0.5));
  }

  /* ── Brand Text ── */
  .brand-name {
    font-family: 'Quicksand', 'Manrope', sans-serif;
    font-size: clamp(44px, 11vw, 76px);
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--primary);
    text-shadow: 0 0 40px rgba(127, 230, 219, 0.25), 0 0 80px rgba(127, 230, 219, 0.08);
    line-height: 1.05;
  }

  .brand-sub {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-tagline {
    font-family: 'Manrope', sans-serif;
    font-size: clamp(11px, 2.5vw, 14px);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--secondary);
    opacity: 0.75;
  }

  /* ── Loading Section ── */
  .loading-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 240px;
    margin-top: 48px;
  }

  /* ── Loading Bar ── */
  .loading-track {
    width: 100%;
    height: 2px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 9999px;
    overflow: hidden;
    position: relative;
  }

  .loading-bar {
    position: absolute;
    top: 0;
    left: -40%;
    width: 40%;
    height: 100%;
    border-radius: 9999px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    box-shadow: 0 0 10px var(--primary), 0 0 4px var(--primary);
    animation: loadSlide 2s ease-in-out infinite;
  }

  @keyframes loadSlide {
    0% { left: -40%; }
    100% { left: 100%; }
  }

  /* ── Status Text ── */
  .status-text {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
    animation: fadeInOut 2.5s ease-in-out infinite;
  }

  @keyframes fadeInOut {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── Down Arrow ── */
  .down-arrow {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.35;
    z-index: 10;
    animation: bobDown 2s ease-in-out infinite;
  }

  .down-arrow svg {
    width: 28px;
    height: 28px;
    color: var(--on-surface);
  }

  @keyframes bobDown {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* ── Ambient floating particles ── */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(30px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="splash">

  <!-- Warm Hue Overlay Layer -->
  <div class="gradient-overlay"></div>

  <!-- Ambient Floating Particles -->
  <div class="particle" style="width:2px;height:2px;background:rgba(127,230,219,0.3);left:15%;bottom:-10%;animation-duration:12s;animation-delay:0s;"></div>
  <div class="particle" style="width:1.5px;height:1.5px;background:rgba(150,165,255,0.25);left:45%;bottom:-10%;animation-duration:16s;animation-delay:2s;"></div>
  <div class="particle" style="width:2px;height:2px;background:rgba(127,230,219,0.2);left:75%;bottom:-10%;animation-duration:14s;animation-delay:4s;"></div>
  <div class="particle" style="width:1px;height:1px;background:rgba(204,249,255,0.3);left:30%;bottom:-10%;animation-duration:18s;animation-delay:1s;"></div>
  <div class="particle" style="width:1.5px;height:1.5px;background:rgba(150,165,255,0.2);left:60%;bottom:-10%;animation-duration:15s;animation-delay:6s;"></div>
  <div class="particle" style="width:1px;height:1px;background:rgba(127,230,219,0.25);left:85%;bottom:-10%;animation-duration:20s;animation-delay:3s;"></div>
  <div class="particle" style="width:1.5px;height:1.5px;background:rgba(210,180,100,0.2);left:50%;bottom:-10%;animation-duration:17s;animation-delay:5s;"></div>
  <div class="particle" style="width:1px;height:1px;background:rgba(196,164,90,0.18);left:70%;bottom:-10%;animation-duration:22s;animation-delay:7s;"></div>
  <!-- Extra warm particles — middle-right cluster -->
  <div class="particle" style="width:2px;height:2px;background:rgba(210,175,90,0.22);left:78%;bottom:-10%;animation-duration:14s;animation-delay:1.5s;"></div>
  <div class="particle" style="width:1.5px;height:1.5px;background:rgba(190,155,75,0.2);left:65%;bottom:-10%;animation-duration:19s;animation-delay:3.5s;"></div>
  <div class="particle" style="width:1px;height:1px;background:rgba(220,190,110,0.18);left:82%;bottom:-10%;animation-duration:16s;animation-delay:8s;"></div>
  <div class="particle" style="width:1.5px;height:1.5px;background:rgba(180,150,80,0.15);left:55%;bottom:-10%;animation-duration:21s;animation-delay:4.5s;"></div>
  <div class="particle" style="width:2px;height:2px;background:rgba(200,165,85,0.17);left:72%;bottom:-10%;animation-duration:13s;animation-delay:9s;"></div>

  <!-- Center Content -->
  <div class="splash-content">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div class="logo-circle">
        <svg class="waveform-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Sound waveform bars -->
          <rect x="4" y="20" width="4" height="12" rx="2" fill="#7FE6DB" opacity="0.7">
            <animate attributeName="height" values="12;20;12" dur="1.2s" repeatCount="indefinite" begin="0s"/>
            <animate attributeName="y" values="20;16;20" dur="1.2s" repeatCount="indefinite" begin="0s"/>
          </rect>
          <rect x="12" y="14" width="4" height="24" rx="2" fill="#7FE6DB" opacity="0.85">
            <animate attributeName="height" values="24;10;24" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
            <animate attributeName="y" values="14;21;14" dur="1.4s" repeatCount="indefinite" begin="0.15s"/>
          </rect>
          <rect x="20" y="8" width="4" height="36" rx="2" fill="#7FE6DB">
            <animate attributeName="height" values="36;16;36" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
            <animate attributeName="y" values="8;18;8" dur="1.1s" repeatCount="indefinite" begin="0.3s"/>
          </rect>
          <rect x="28" y="12" width="4" height="28" rx="2" fill="#7FE6DB" opacity="0.9">
            <animate attributeName="height" values="28;14;28" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
            <animate attributeName="y" values="12;19;12" dur="1.5s" repeatCount="indefinite" begin="0.1s"/>
          </rect>
          <rect x="36" y="17" width="4" height="18" rx="2" fill="#7FE6DB" opacity="0.75">
            <animate attributeName="height" values="18;26;18" dur="1.3s" repeatCount="indefinite" begin="0.25s"/>
            <animate attributeName="y" values="17;13;17" dur="1.3s" repeatCount="indefinite" begin="0.25s"/>
          </rect>
          <rect x="44" y="21" width="4" height="10" rx="2" fill="#7FE6DB" opacity="0.6">
            <animate attributeName="height" values="10;18;10" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
            <animate attributeName="y" values="21;17;21" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
          </rect>
        </svg>
      </div>
    </div>

    <!-- Brand Identity -->
    <div class="brand-sub">
      <h1 class="brand-name">White<br/>Noise</h1>
      <p class="brand-tagline">Your Personal Sound Sanctuary</p>
    </div>

    <!-- Loading Section -->
    <div class="loading-section">
      <div class="loading-track">
        <div class="loading-bar"></div>
      </div>
      <span class="status-text">Finding your sanctuary...</span>
    </div>

  </div>

  <!-- Down Arrow -->
  <div class="down-arrow">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="7 10 12 15 17 10"/>
      <polyline points="7 4 12 9 17 4"/>
    </svg>
  </div>

</div>

</body>
</html>
